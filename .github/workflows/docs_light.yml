name: Docs

on:
  pull_request:
    paths:
      - '.dockerignore'
      - '.github/workflows/docs_light.yml'
      - 'ci/docker/conda.dockerfile'
      - 'ci/docker/conda-cpp.dockerfile'
      - 'ci/docker/conda-python.dockerfile'
      - 'ci/scripts/cpp_build.sh'
      - 'ci/scripts/python_build.sh'
      - 'compose.yaml'
      - 'cpp/apidoc/**'
      - 'docs/**'

permissions:
  contents: read

env:
  ARCHERY_DEBUG: 1
  ARROW_ENABLE_TIMING_TESTS: OFF
  DOCKER_VOLUME_PREFIX: ".docker/"

jobs:

  light:
    name: AMD64 Conda Python 3.12 Sphinx Documentation
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.title, 'WIP') }}
    timeout-minutes: 60
    env:
      PYTHON: "3.12"
    steps:
      - name: Checkout Arrow
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Cache Docker Volumes
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: .docker
          key: conda-docs-${{ hashFiles('cpp/**') }}
          restore-keys: conda-docs-
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: 3.12
      - name: Setup Archery
        run: pip install -e dev/archery[docker]
      - name: Execute Docker Build
        env:
          ARCHERY_DOCKER_USER: ${{ secrets.DOCKERHUB_USER }}
          ARCHERY_DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
        run: archery docker run conda-python-docs
