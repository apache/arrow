name: Check Labels Reusable

on:
  workflow_call:
    inputs:
      parent-workflow:
        description: "The parent workflow filename (without .yml)"
        required: true
        type: string
    outputs:
      ci-extra-labels:
        description: "The extra CI labels"
        value: ${{ jobs.check-labels.outputs.ci-extra-labels }}

permissions:
  contents: read
  pull-requests: read

jobs:
  check-labels:
    name: Check labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ci-extra-labels: ${{ steps.check.outputs.ci-extra-labels }}
    steps:
      - name: Check
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          PARENT_WORKFLOW: ${{ inputs.parent-workflow }}
        run: |
          set -ex
          case "${GITHUB_EVENT_NAME}" in
            # On PRs, extra builds are only triggered manually using labelling
            pull_request)
              {
                echo "ci-extra-labels<<LABELS"
                gh pr view ${{ github.event.number }} \
                  --jq '[.labels[].name | select(startswith("CI: Extra"))]' \
                  --json labels \
                  --repo ${GITHUB_REPOSITORY}
                echo "LABELS"
              } >> "${GITHUB_OUTPUT}"
              ;;
            # Other event types trigger through specific rules in `*_extra.yml`
          esac
